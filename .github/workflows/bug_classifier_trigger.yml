name: Send GitHub Issue To bug_classifier

on:
  issues:
    types:
      - opened
      - edited
      - reopened

permissions:
  contents: read
  issues: read

jobs:
  classify-issue:
    if: ${{ github.event.issue.pull_request == null }}
    runs-on: self-hosted
    env:
      BUG_CLASSIFIER_URL: http://127.0.0.1:8000
      BUG_CLASSIFIER_TOP_K: 3
    steps:
      - name: Check bug_classifier health
        shell: bash
        run: |
          health_url="${BUG_CLASSIFIER_URL}/health"
          
          response=$(curl -s -w "\n%{http_code}" "$health_url" --max-time 15)
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          if [ "$http_code" != "200" ]; then
            echo "bug_classifier health check failed: HTTP $http_code"
            echo "$body"
            exit 1
          fi
          
          status=$(echo "$body" | jq -r '.status // empty')
          if [ "$status" != "ok" ]; then
            echo "bug_classifier health check returned unexpected response"
            echo "$body"
            exit 1
          fi
          
          echo "bug_classifier health check passed: $status"

      - name: Send issue to bug_classifier
        shell: bash
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_ID: ${{ github.event.issue.node_id }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_LABELS_JSON: ${{ toJson(github.event.issue.labels.*.name) }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          base_url = os.environ["BUG_CLASSIFIER_URL"].rstrip("/")
          endpoint = f"{base_url}/integration/github/issues/classify"
          payload = {
              "repository": os.environ.get("REPOSITORY", ""),
              "issue_number": int(os.environ.get("ISSUE_NUMBER", "0") or 0),
              "issue_id": os.environ.get("ISSUE_ID", ""),
              "issue_url": os.environ.get("ISSUE_URL", ""),
              "title": os.environ.get("ISSUE_TITLE", ""),
              "body": os.environ.get("ISSUE_BODY", ""),
              "labels": json.loads(os.environ.get("ISSUE_LABELS_JSON", "[]") or "[]"),
              "top_k": int(os.environ.get("BUG_CLASSIFIER_TOP_K", "3") or 3),
          }

          request = urllib.request.Request(
              endpoint,
              data=json.dumps(payload, ensure_ascii=False).encode("utf-8"),
              headers={"Content-Type": "application/json; charset=utf-8"},
              method="POST",
          )

          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  body = response.read().decode("utf-8", errors="replace")
          except urllib.error.HTTPError as error:
              error_body = error.read().decode("utf-8", errors="replace")
              print(f"bug_classifier request failed: HTTP {error.code}", file=sys.stderr)
              print(error_body, file=sys.stderr)
              raise
          except urllib.error.URLError as error:
              print(f"bug_classifier request failed: {error}", file=sys.stderr)
              raise

          print(body)
          PY
