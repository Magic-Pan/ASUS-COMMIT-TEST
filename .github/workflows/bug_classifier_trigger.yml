name: Send GitHub Issue To bug_classifier

on:
  issues:
    types:
      - opened
     # - edited
     # - reopened

permissions:
  contents: read
  issues: read

jobs:
  classify-issue:
    if: ${{ github.event.issue.pull_request == null }}
    runs-on: self-hosted
    env:
      BUG_CLASSIFIER_URL: http://127.0.0.1:8000
      BUG_CLASSIFIER_TOP_K: 3
    steps:
      - name: Check bug_classifier health
        shell: pwsh
        run: |
          $healthUrl = "${env:BUG_CLASSIFIER_URL}/health"
          try {
            $response = Invoke-RestMethod -Uri $healthUrl -Method Get -TimeoutSec 15
          }
          catch {
            Write-Error "bug_classifier health check failed: $($_.Exception.Message)"
            exit 1
          }

          if (-not $response -or $response.status -ne "ok") {
            Write-Error "bug_classifier health check returned unexpected response"
            $response | ConvertTo-Json -Depth 5
            exit 1
          }

          Write-Host "bug_classifier health check passed: $($response.status)"

      - name: Send issue to bug_classifier
        shell: pwsh
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_ID: ${{ github.event.issue.node_id }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_LABELS_JSON: ${{ toJson(github.event.issue.labels.*.name) }}
        run: |
          $body = @{
              repository = $env:REPOSITORY
              issue_number = [int]$env:ISSUE_NUMBER
              issue_id = $env:ISSUE_ID
              issue_url = $env:ISSUE_URL
              title = $env:ISSUE_TITLE
              body = $env:ISSUE_BODY
              labels = @($env:ISSUE_LABELS_JSON | ConvertFrom-Json)
              top_k = [int]$env:BUG_CLASSIFIER_TOP_K
          } | ConvertTo-Json -Depth 10

          try {
              $response = Invoke-RestMethod -Uri "$env:BUG_CLASSIFIER_URL/integration/github/issues/classify" `
                  -Method Post `
                  -Body $body `
                  -ContentType "application/json; charset=utf-8" `
                  -TimeoutSec 30
              
              Write-Host ($response | ConvertTo-Json -Depth 10)
          }
          catch {
              Write-Error "bug_classifier request failed: $($_.Exception.Message)"
              if ($_.Exception.Response) {
                  $reader = New-Object System.IO.StreamReader($_.Exception.Response.GetResponseStream())
                  $errorBody = $reader.ReadToEnd()
                  Write-Error "Response body: $errorBody"
              }
              exit 1
          }
